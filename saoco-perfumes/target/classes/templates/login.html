<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Saoco Perfumes</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; }
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #d4a5c4 0%, #e8d5e0 100%);
            padding: 2rem;
        }
        .auth-box {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-logo span {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: #722f37;
        }
        .auth-title {
            text-align: center;
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            color: #1a1a1a;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border: 1px solid #e8e4df;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
        }
        .form-group input:focus {
            outline: none;
            border-color: #722f37;
        }
        .auth-btn {
            width: 100%;
            padding: 1rem;
            background: #722f37;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .auth-btn:hover { background: #5a252c; }
        .auth-error {
            background: #fee;
            color: #c33;
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            text-align: center;
        }
        .auth-back {
            text-align: center;
            margin-top: 1.5rem;
        }
        .auth-back a {
            color: #722f37;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-logo">
                <span>saoco</span>
            </div>
            <h1 class="auth-title">Iniciar Sesión</h1>
            
            <div th:if="${param.error}" class="auth-error">
                Usuario o contraseña incorrectos
            </div>
            
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <input type="text" name="username" placeholder="Usuario" required>
                </div>
                <div class="form-group">
                    <input type="password" name="password" placeholder="Contraseña" required>
                </div>
                <button type="submit" class="auth-btn">Entrar</button>
            </form>
            
            <div class="auth-back">
                <a th:href="@{/}">← Volver a la tienda</a>
            </div>
        </div>
    </div>
</body>
</html>
