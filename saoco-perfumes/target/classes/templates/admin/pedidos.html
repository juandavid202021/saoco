<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos — Admin Saoco</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f5f5; }
        .admin-layout { display: flex; min-height: 100vh; }
        
        .sidebar {
            width: 260px;
            background: #1a1a1a;
            color: white;
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
        }
        .sidebar-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #333;
        }
        .sidebar-menu { list-style: none; }
        .sidebar-menu li { margin-bottom: 0.5rem; }
        .sidebar-menu a {
            color: #aaa;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        .sidebar-menu a:hover, .sidebar-menu a.active {
            background: #722f37;
            color: white;
        }
        .sidebar-menu .icon { font-size: 1.1rem; }
        .logout-btn {
            background: transparent;
            color: #888;
            border: 1px solid #444;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .main {
            margin-left: 260px;
            flex: 1;
            padding: 2rem;
        }
        .main-header {
            margin-bottom: 2rem;
        }
        .main-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
        }
        .breadcrumb {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }
        
        .table-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #fafafa;
            padding: 1rem;
            text-align: left;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            font-weight: 600;
        }
        td {
            padding: 1rem;
            border-top: 1px solid #f0f0f0;
            font-size: 0.9rem;
        }
        .badge {
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-pendiente { background: #fff3cd; color: #856404; }
        .badge-enproceso { background: #d1ecf1; color: #0c5460; }
        .badge-entregado { background: #d4edda; color: #155724; }
        .badge-cancelado { background: #f8d7da; color: #721c24; }
        
        .estado-select {
            padding: 0.4rem 0.8rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">saoco admin</div>
            <ul class="sidebar-menu">
                <li><a th:href="@{/admin/dashboard}"><span class="icon">&#128202;</span> Dashboard</a></li>
                <li><a th:href="@{/admin/productos}"><span class="icon">&#128142;</span> Productos</a></li>
                <li><a th:href="@{/admin/pedidos}" class="active"><span class="icon">&#128230;</span> Pedidos</a></li>
                <li><a th:href="@{/admin/mensajes}"><span class="icon">&#9993;</span> Mensajes</a></li>
                <li style="margin-top: 2rem;">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="logout-btn">→ Cerrar sesión</button>
                    </form>
                </li>
            </ul>
        </aside>
        
        <main class="main">
            <div class="main-header">
                <p class="breadcrumb">Admin / Pedidos</p>
                <h1>Pedidos Recibidos</h1>
            </div>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Cliente</th>
                            <th>Contacto</th>
                            <th>Dirección</th>
                            <th>Productos</th>
                            <th>Total</th>
                            <th>Fecha</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="pedido : ${pedidos}">
                            <td th:text="${pedido.id}">1</td>
                            <td th:text="${pedido.nombreCliente} + ' ' + ${pedido.apellidos}">Nombre</td>
                            <td th:text="${pedido.contacto}">Contacto</td>
                            <td th:text="${pedido.direccion} + ', ' + ${pedido.ciudad} + ', ' + ${pedido.provincia}">Dirección</td>
                            <td th:text="${pedido.productos}" style="max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Productos</td>
                            <td th:text="'$ ' + ${#numbers.formatDecimal(pedido.total, 0, 'POINT', 0, 'COMMA')}">$0</td>
                            <td th:text="${#temporals.format(pedido.fecha, 'dd/MM/yyyy HH:mm')}">Fecha</td>
                            <td>
                                <form th:action="@{/admin/pedidos/estado/{id}(id=${pedido.id})}" method="post" style="display: inline;">
                                    <select name="estado" class="estado-select" th:onchange="this.form.submit()">
                                        <option value="PENDIENTE" th:selected="${pedido.estado == 'PENDIENTE'}">PENDIENTE</option>
                                        <option value="EN PROCESO" th:selected="${pedido.estado == 'EN PROCESO'}">EN PROCESO</option>
                                        <option value="ENTREGADO" th:selected="${pedido.estado == 'ENTREGADO'}">ENTREGADO</option>
                                        <option value="CANCELADO" th:selected="${pedido.estado == 'CANCELADO'}">CANCELADO</option>
                                    </select>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(pedidos)}">
                            <td colspan="8" style="text-align: center; color: #888; padding: 3rem;">No hay pedidos registrados</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</body>
</html>
