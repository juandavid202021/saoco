<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${producto.id} ? 'Editar Producto' : 'Nuevo Producto'">Producto</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f5f5; }
        .admin-layout { display: flex; min-height: 100vh; }
        
        .sidebar {
            width: 260px;
            background: #1a1a1a;
            color: white;
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
        }
        .sidebar-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #333;
        }
        .sidebar-menu { list-style: none; }
        .sidebar-menu li { margin-bottom: 0.5rem; }
        .sidebar-menu a {
            color: #aaa;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        .sidebar-menu a:hover, .sidebar-menu a.active {
            background: #722f37;
            color: white;
        }
        .sidebar-menu .icon { font-size: 1.1rem; }
        .logout-btn {
            background: transparent;
            color: #888;
            border: 1px solid #444;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .main {
            margin-left: 260px;
            flex: 1;
            padding: 2rem;
        }
        .main-header {
            margin-bottom: 2rem;
        }
        .main-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
        }
        .breadcrumb {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }
        
        .form-card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            max-width: 600px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #722f37;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .btn {
            padding: 0.9rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }
        .btn-primary {
            background: #722f37;
            color: white;
        }
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
            margin-left: 1rem;
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">saoco admin</div>
            <ul class="sidebar-menu">
                <li><a th:href="@{/admin/dashboard}"><span class="icon">&#128202;</span> Dashboard</a></li>
                <li><a th:href="@{/admin/productos}" class="active"><span class="icon">&#128142;</span> Productos</a></li>
                <li><a th:href="@{/admin/pedidos}"><span class="icon">&#128230;</span> Pedidos</a></li>
                <li><a th:href="@{/admin/mensajes}"><span class="icon">&#9993;</span> Mensajes</a></li>
                <li style="margin-top: 2rem;">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="logout-btn">→ Cerrar sesión</button>
                    </form>
                </li>
            </ul>
        </aside>
        
        <main class="main">
            <div class="main-header">
                <p class="breadcrumb">Admin / Productos / <span th:text="${producto.id} ? 'Editar' : 'Nuevo'">Nuevo</span></p>
                <h1 th:text="${producto.id} ? 'Editar Producto' : 'Nuevo Producto'">Nuevo Producto</h1>
            </div>
            
            <div class="form-card">
                <form th:action="@{/admin/productos/guardar}" method="post">
                    <input type="hidden" name="id" th:value="${producto.id}">
                    
                    <div class="form-group">
                        <label>Nombre del perfume</label>
                        <input type="text" name="nombre" th:value="${producto.nombre}" required>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Marca</label>
                            <input type="text" name="marca" th:value="${producto.marca}" required>
                        </div>
                        <div class="form-group">
                            <label>Categoría</label>
                            <select name="categoria" required>
                                <option value="Árabes" th:selected="${producto.categoria == 'Árabes'}">Árabes</option>
                                <option value="Amaderados" th:selected="${producto.categoria == 'Amaderados'}">Amaderados</option>
                                <option value="Dulces" th:selected="${producto.categoria == 'Dulces'}">Dulces</option>
                                <option value="Florales" th:selected="${producto.categoria == 'Florales'}">Florales</option>
                                <option value="Cítricos" th:selected="${producto.categoria == 'Cítricos'}">Cítricos</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>URL de la imagen</label>
                        <input type="url" name="imagenUrl" th:value="${producto.imagenUrl}" placeholder="https://...">
                    </div>
                    
                    <div class="form-group">
                        <label>Notas olfativas</label>
                        <textarea name="notasOlfativas" rows="3" th:text="${producto.notasOlfativas}"></textarea>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Precio</label>
                            <input type="number" name="precio" th:value="${producto.precio}" required>
                        </div>
                        <div class="form-group">
                            <label>Stock</label>
                            <input type="number" name="stock" th:value="${producto.stock}" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>
                            <input type="checkbox" name="disponible" th:checked="${producto.disponible}" value="true">
                            Disponible para venta
                        </label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Guardar Producto</button>
                    <a th:href="@{/admin/productos}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
