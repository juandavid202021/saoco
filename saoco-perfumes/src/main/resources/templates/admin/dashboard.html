<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin — Saoco Perfumes</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f5f5; }
        .admin-layout { display: flex; min-height: 100vh; }
        
        .sidebar {
            width: 260px;
            background: #1a1a1a;
            color: white;
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
        }
        .sidebar-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #333;
        }
        .sidebar-menu { list-style: none; }
        .sidebar-menu li { margin-bottom: 0.5rem; }
        .sidebar-menu a {
            color: #aaa;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        .sidebar-menu a:hover, .sidebar-menu a.active {
            background: #722f37;
            color: white;
        }
        .sidebar-menu .icon { font-size: 1.1rem; }
        .logout-btn {
            background: transparent;
            color: #888;
            border: 1px solid #444;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .main {
            margin-left: 260px;
            flex: 1;
            padding: 2rem;
        }
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .main-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
        }
        .breadcrumb {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .stat-label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a1a;
            margin: 0.5rem 0;
        }
        .stat-change {
            font-size: 0.8rem;
            color: #28a745;
        }
        
        .btn {
            padding: 0.7rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            border: none;
            cursor: pointer;
        }
        .btn-primary {
            background: #722f37;
            color: white;
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">saoco admin</div>
            <ul class="sidebar-menu">
                <li><a th:href="@{/admin/dashboard}" class="active"><span class="icon">&#128202;</span> Dashboard</a></li>
                <li><a th:href="@{/admin/productos}"><span class="icon">&#128142;</span> Productos</a></li>
                <li><a th:href="@{/admin/pedidos}"><span class="icon">&#128230;</span> Pedidos</a></li>
                <li><a th:href="@{/admin/mensajes}"><span class="icon">&#9993;</span> Mensajes</a></li>
                <li style="margin-top: 2rem;">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="logout-btn">→ Cerrar sesión</button>
                    </form>
                </li>
            </ul>
        </aside>
        
        <main class="main">
            <div class="main-header">
                <div>
                    <p class="breadcrumb">Admin / Dashboard</p>
                    <h1>Panel de Control</h1>
                </div>
                <a th:href="@{/}" class="btn btn-primary">← Ver tienda</a>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <p class="stat-label">Total Perfumes</p>
                    <p class="stat-value" th:text="${totalProductos}">0</p>
                    <p class="stat-change">En catálogo</p>
                </div>
                <div class="stat-card">
                    <p class="stat-label">Pedidos</p>
                    <p class="stat-value" th:text="${totalPedidos}">0</p>
                    <p class="stat-change">Totales</p>
                </div>
                <div class="stat-card">
                    <p class="stat-label">Stock Crítico</p>
                    <p class="stat-value" th:text="${stockCritico}">0</p>
                    <p class="stat-change">Menos de 5 unidades</p>
                </div>
                <div class="stat-card">
                    <p class="stat-label">Mensajes Nuevos</p>
                    <p class="stat-value" th:text="${mensajesNuevos}">0</p>
                    <p class="stat-change">Sin leer</p>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
